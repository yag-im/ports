installer:
  tasks:
    - copy_src_cd_images:
    - qemu:
        flavor: WINXPSP3
        tasks:
          - mount:
              src: '{DEST_DIR}'
              cd_images_as_letters: true
          - run:
              # just to avoid Wing lib error messagebox on startup
              path: '{FIRST_CD_DRIVE}\SETUP.EXE'
              exit: false
          - gen_run_script:
              path: '{FIRST_CD_DRIVE}\WORK\GSTR.EXE'
