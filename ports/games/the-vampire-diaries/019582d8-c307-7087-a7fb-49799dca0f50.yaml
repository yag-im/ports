          - CDSOUND
          - CDVIDEO
          - HDSOUND
          - HDVIDEO
          - ART
          - FONT
          - IFF
    - extract:
        src: "{SRC_DIR}/{descr[distro][files][1]}"
        dest: "{DEST_APP_DIR}"
        files:
          - CDSOUND
          - CDVIDEO
    - extract:
        src: "{SRC_DIR}/{descr[distro][files][2]}"
        dest: "{DEST_APP_DIR}"
        files:
          - CDSOUND
          - CDVIDEO
    - scummvm:
        # https://wiki.scummvm.org/index.php?title=The_Vampire_Diaries
        tasks:
          - gen_run_script:
              game: nancy:vampirediaries
              path: "{DEST_APP_DIR}"
