  year_released: 1999
  tags:
installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        app_drive_size: 150 # app requires min 130
        flavor: WIN95OSR25
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\QuickTimeInstaller.exe' # requires manual installation BEFORE main installer
          - run:
              path: '{FIRST_CD_DRIVE}\Install.exe'
          - gen_run_script:
              path: '{APP_DIR}\Bellinis Bikini\Bellinis Bikini.exe'
