  igdb_slug: bellinis-bikini
  lang: sv
  media_assets:
  name: Bellinis Bikini
  platform: win
  publisher: Savannah Entertainment
  refs:
    ag_id:
    lutris_id: bellinis-bikini
    mg_id:
    pcgw_id:
    qz_id:
  reqs:
    # 16 bit is minimum
    color_bits: 16
    screen_height: 480
    screen_width: 640
    loading_duration: 19
  runner:
    name: dosbox-x # in qemu sound is choppy; in wine app crashes on startup
    ver: 2025.12.01
