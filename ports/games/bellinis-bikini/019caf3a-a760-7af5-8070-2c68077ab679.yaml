descr:
  distro:
    files:
      - BBELLIN.iso
    format: 1CD
    url: https://download.macintoshgarden.org/games/BBELLIN.toast
    # renamed toast to iso
  igdb_slug: bellinis-bikini
  lang: fi
  media_assets:
    cover:
      image_id: 019caf3a-a760-7af5-8070-2c68077ab679
    screenshots: []
  name: "Bellinin Bikinit"
  platform: win
  publisher: Savannah Entertainment
  refs:
    ag_id:
    lutris_id: bellinis-bikini
    mg_id:
    pcgw_id:
    qz_id:
  reqs:
    # 16 bit is minimum
    color_bits: 16
    screen_height: 480
    screen_width: 640
    loading_duration: 19
  runner:
    name: dosbox-x
    ver: 2025.12.01
  uuid: 019caf3a-a760-7af5-8070-2c68077ab679
  year_released: 1999
  tags:
    - bellini
installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        app_drive_size: 150 # app requires min 130
        flavor: WIN95OSR25
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\QuickTimeInstaller.exe' # requires manual installation of QT4 BEFORE main installer
          - run:
              path: '{FIRST_CD_DRIVE}\Bellinin setup.exe'
          - gen_run_script:
              path: '{APP_DIR}\Bellinin bikinit\Bellinin bikinit.exe'
