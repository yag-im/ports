installer:
  tasks:
    - copy_src_cd_images:
    - qemu:
        flavor: WIN98SE
        tasks:
          - mount:
              src: '{DEST_DIR}'
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\setup\setup.exe'
              exit: false
              # run once to skip reg window and cd test
          - gen_run_script:
              path: '{APP_DIR}\Blues Treasure Hunt\Blue''sTreasureHunt.r32'
              args:
                - Blue'sTreasureHunt-Disc2

