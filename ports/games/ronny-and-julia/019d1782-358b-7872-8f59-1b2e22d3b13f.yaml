descr:
  distro:
    files:
      - RonnyJulia.iso
    format: 1CD
    url: https://archive.org/download/ronny-julia/RonnyJulia.iso
  igdb_slug: ronny-and-julia
  lang: sv
  media_assets:
    cover:
      image_id: 019d1782-358b-7872-8f59-1b2e22d3b13f
    screenshots: []
  name: "TV:s Julkalender 2000: Ronny & Julia"
  platform: win
  publisher: Young Genius
  refs:
    ag_id:
    lutris_id:
    mg_id:
    pcgw_id:
    qz_id:
  reqs:
    color_bits: 16
    screen_height: 480
    screen_width: 640
  runner:
    name: wine # sound distortion in qemu, slow in dosbox-x
    ver: "10.0"
  uuid: 019d1782-358b-7872-8f59-1b2e22d3b13f
  year_released: 2000
  tags:
    - edutainment
    - kids
    - julkalender
installer:
  tasks:
    - extract:
        src: "{SRC_DIR}"
        dest: "{DEST_DIR}"
        cd_images_as_letters: true
    - wine:
        # app_drive_size: 30 # uses 25
        tasks:
          - mount:
              letter: "{FIRST_CD_DRIVE_LETTER}"
              src: "{DEST_DIR}/{FIRST_CD_DRIVE_LETTER}"
          - run:
              path: '{FIRST_CD_DRIVE}\SETUP\SETUP.EXE' # QT4
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\TVs Julkalender 2000\RJ.exe'
