  tags:
    - kids
installer:
  tasks:
    - extract:
        src: "{SRC_DIR}/{descr[distro][files][0]}"
        dest: "{DEST_APP_DIR}"
    - dosbox:
        conf:
          fullscreen: true
          cycles: fixed 6000
        tasks:
          - gen_run_script:
              path: "{APP_DIR}/GADGET.EXE"
              pre_exec:
                # otherwise no music will be played
                - CONFIG -set "mididevice=default"
                - CONFIG -set "mpu401=none"
    - copy:
        src: "{PORT_FILES_DIR}/{item}"
        dest: "{DEST_APP_DIR}"
        loop:
          - "OPTIONS"
