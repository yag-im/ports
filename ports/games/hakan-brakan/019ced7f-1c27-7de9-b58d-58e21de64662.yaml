  tags:
installer:
  tasks:
    - copy_src_cd_images:
    - qemu:
        flavor: WINXPSP3
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\setup\QuickTime\QuickTimeInstaller.exe'
          - run:
              path: '{FIRST_CD_DRIVE}\start.exe' # run app once after install so it don't ask about full screen on the next run
              # TODO: warning! winxp can't recognize sw characters so after install rename dir and exec to: '{APP_DIR}\hakan\hakan.exe'
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\hakan\hakan.exe'
