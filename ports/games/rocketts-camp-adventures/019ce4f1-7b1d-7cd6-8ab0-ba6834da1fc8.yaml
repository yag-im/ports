installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        app_drive_size: 50 # requires 24MB, but readme says 50MB required
        flavor: WIN95OSR25
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\SETUP.EXE' # somehow doesn't start on its own; installs DX6
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\Rockett.exe'
