descr:
  distro:
    files:
      - BarbieDigitalMakeover.iso
    format: 1CD
    url: https://archive.org/download/BarbieDigitalMakeover1999_201903/BarbieDigitalMakeover.iso
  igdb_slug: digital-makeover
  lang: en
  media_assets:
  name: "Barbie: Digital Makeover"
  platform: win
  publisher: Mattel Media
  refs:
    ag_id:
    lutris_id: digital-makeover
    mg_id:
    pcgw_id:
    qz_id:
  reqs:
    # readme.txt: min requirements
    color_bits: 16
    screen_height: 480
    screen_width: 640
    loading_duration: 27
  runner:
    name: wine
    ver: "11.0"
  uuid: 019ca664-3f8a-7c55-85a0-50a5d4024a7e
  year_released: 1999
  tags:
    - barbie
installer:
  tasks:
    - extract:
        src: "{SRC_DIR}"
        dest: "{DEST_DIR}"
        cd_images_as_letters: true
    - wine:
        # reported crashes in qemu/winxpsp3: https://github.com/yag-im/ports/issues/10
        # less but still crashes in qemu/win98se
        os_ver: win95
        tasks:
          - mount:
              letter: "{FIRST_CD_DRIVE_LETTER}"
              src: "{DEST_DIR}/{FIRST_CD_DRIVE_LETTER}"
              label: "23465"
          - run:
              path: '{FIRST_CD_DRIVE}\Setup.exe' # also adds DX 6.1
          - gen_run_script:
              path: '{APP_DIR}\Makeover.exe'
