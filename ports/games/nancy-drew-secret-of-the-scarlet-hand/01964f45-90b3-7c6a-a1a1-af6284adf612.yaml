installer:
  tasks:
    - copy_src_cd_images:
    - qemu:
        flavor: WIN98SE # fails to start in XP
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\setup.exe'
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\Game.exe'

