descr:
  distro:
    files:
      - Famous Five 2 - The Silver Tower.bin
    format: 1CD
    url: https://archive.org/details/famous-five-ravensburger
  igdb_slug: the-famous-five-silver-tower
  lang: en
  media_assets:
    cover:
      image_id: 019da1a9-da54-7795-a3c4-7b3d841e95a8
    screenshots: []
  name: "The Famous Five: Silver Tower"
  platform: win
  publisher: Ravensburger Interactive Media GmbH
  refs:
    ag_id:
    lutris_id: the-famous-five-silver-tower
    mg_id: 197397
    pcgw_id:
    qz_id:
  reqs:
    color_bits: 16
    screen_height: 600
    screen_width: 800
    ua:
      lock_pointer: true
  runner:
    name: wine
    ver: "11.0"
  uuid: 019da1a9-da54-7795-a3c4-7b3d841e95a8
  year_released: 2000
  tags:
    - kids
    - famous-five
installer:
  tasks:
    - extract:
        src: "{SRC_DIR}"
        dest: "{DEST_DIR}"
        cd_images_as_letters: true
    - wine:
        # app_drive_size: 25 # uses 18MB
        tasks:
          - mount:
              letter: "{FIRST_CD_DRIVE_LETTER}"
              src: "{DEST_DIR}/{FIRST_CD_DRIVE_LETTER}"
          - run:
              path: '{FIRST_CD_DRIVE}\Setup.exe' # DX7
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\Famous Five 2.exe'

