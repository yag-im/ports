installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        flavor: WIN95OSR25
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\setup.exe' # QT 3.0.2
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\pingu.exe'
