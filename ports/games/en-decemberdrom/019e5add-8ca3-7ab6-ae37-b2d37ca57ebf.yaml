installer:
  tasks:
    - copy_src_cd_images:
    - qemu:
        flavor: WINXPSP3
        tasks:
          - mount:
              src: '{DEST_DIR}'
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\START.EXE'
              exit: false
          - move: # TODO: due to the autostartup characters in a path limitations
              src: '{APP_DIR}\En decemberdröm\*'
              dest: '{APP_DIR}'
          - move: # TODO: due to the autostartup characters in a path limitations
              src: '{APP_DIR}\En decemberdröm.exe'
              dest: '{APP_DIR}\end.exe'
          - gen_run_script:
              path: '{APP_DIR}\end.exe'
