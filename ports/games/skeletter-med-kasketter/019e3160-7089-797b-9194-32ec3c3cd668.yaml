    - kids
    - edutainment
installer:
  tasks:
    - copy_src_cd_images:
    - qemu:
        flavor: WIN98SE # due to 256 colors req, XP shows a warning msg
        tasks:
          - mount:
              src: '{DEST_DIR}'
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\StartPC.exe'
              exit: false
          - gen_run_script:
              path: '{FIRST_CD_DRIVE}\StartPC.exe'
