descr:
  distro:
    files:
      - Skeletter_med_kasketter.iso # manually converted from toast file: dd if=Skeletter_med_kasketter.toast of=Skeletter_med_kasketter.iso bs=1M
    format: 1CD
    url: https://www.macintoshrepository.org/19031-skeletter-med-kasketter-skeletons-with-hats-
  igdb_slug: skeletter-med-kasketter
  lang: sv
  media_assets:
  name: 'Skeletter med Kasketter'
  platform: win
  publisher: Savannah Entertainment
  refs:
    ag_id:
    lutris_id: skeletter-med-kasketter
    mg_id:
    pcgw_id:
    qz_id:
  reqs:
    # 256 colors req warning msg
    color_bits: 8
    screen_height: 480
    screen_width: 640
  runner:
    name: qemu
    ver: latest
  uuid: 019e3160-7089-797b-9194-32ec3c3cd668
  year_released: 1998
