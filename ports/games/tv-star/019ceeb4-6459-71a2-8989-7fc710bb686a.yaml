installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        app_drive_size: 700 # uses 564MB; CD is still required during game!
        flavor: WIN95OSR25
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true

          - run:
              path: '{FIRST_CD_DRIVE}\SETUP.EXE'
          - run:
              path: '{APP_DIR}\install\redist\directx\dxsetup.exe'
          - run:
              path: '{APP_DIR}\install\iv5play.exe'
          - gen_run_script:
              path: '{APP_DIR}\Wannabe.exe'

