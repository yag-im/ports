installer:
  tasks:
    - copy_src_cd_images:
    - qemu:
        flavor: WIN98SE
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true # two CDs mounted separately, to avoid Ctrl+F4
          - run:
              path: "EXPLORER.EXE"
              exit: false
          # shift time to below 01/01/2026 (https://wiki.scummvm.org/index.php?title=Gob/DEV6_Information)
          # and proceed with setup (installs DX6)
          # do not add "New Application" (mazes), as next time mumazessic intro will be skipped
          - gen_run_script:
              path: '{APP_DRIVE}\KA\ADIBOO\WLOADER.EXE'
