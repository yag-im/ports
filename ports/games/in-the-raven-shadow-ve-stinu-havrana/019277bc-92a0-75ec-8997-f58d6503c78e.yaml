    name: wine
    ver: '10.0' # no sound in 11.0
  uuid: 019277bc-92a0-75ec-8997-f58d6503c78e
  year_released: 2003
installer:
  tasks:
    - extract:
        src: '{SRC_DIR}'
        dest: '{DEST_DIR}'
        cd_images_as_letters: true
    - file:
        path: '{DEST_APP_DIR}'
        state: directory
    - copy:
        src: '{DEST_DIR}/{FIRST_CD_DRIVE_LETTER}/cd data'
        dest: '{DEST_APP_DIR}/Data'
    - move:
        src: '{DEST_APP_DIR}/Data/*.dll'
        dest: '{DEST_APP_DIR}'
    - copy:
        # mock CD label checks. Also *avi files must be present in Data dir
        src: '{SRC_DIR}/patch/In The Raven Shadow.exe'
        dest: '{DEST_APP_DIR}'
    - file:
        path: '{DEST_DIR}/{FIRST_CD_DRIVE_LETTER}'
        state: absent
    - wine:
        os_ver: win95
        virtual_desktop: 640x480 # black screen without it
        tasks:
          - winetricks:
              cmd: renderer=no3d
          - gen_run_script:
              path: '{APP_DIR}\In The Raven Shadow.exe'
    - shell:
        cmd: "printf '%s' 'D:\\APP' > {DEST_DIR}/.wine/drive_c/windows/fate.ins"
