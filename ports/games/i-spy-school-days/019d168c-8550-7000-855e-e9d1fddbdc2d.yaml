installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        flavor: WIN95OSR25
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\setup.exe'
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\runISPY.exe'
              exit: false # runs in bg
