descr:
  distro:
    files:
      - NUMBERLAND.ISO
    format: 1CD
    url: https://archive.org/download/NUMBERLAND/NUMBERLAND.ISO
  igdb_slug: stuart-little-his-adventures-in-numberland
  lang: en
  media_assets:
  name: "Stuart Little: His Adventures in Numberland"
  platform: win
  publisher: The Learning Company
  refs:
    ag_id:
    lutris_id: stuart-little-his-adventures-in-numberland
    mg_id:
    pcgw_id:
    qz_id:
  reqs:
    color_bits: 16
    screen_height: 480
    screen_width: 640
