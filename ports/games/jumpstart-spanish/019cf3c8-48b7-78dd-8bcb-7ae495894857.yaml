installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        app_drive_size: 10 # uses: 3MB
        flavor: WIN95OSR25
        tasks:
          - mount:
              src: "{DEST_DIR}/{descr[distro][files][0]}"
              letter: "{FIRST_CD_DRIVE_LETTER}"
          - run:
              path: '{FIRST_CD_DRIVE}\SETUP.EXE' # install in "Learn: Spanish, Instructions: English" mode
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\JSSPAN.EXE'
