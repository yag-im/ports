installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        app_drive_size: 25 # uses 17MB
        flavor: WIN95OSR25
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: "EXPLORER.EXE"
              exit: false
          # - run:
          #     path: '{FIRST_CD_DRIVE}\Install BP Junior.exe' # doesn't work from autorun
          #     exit: false
          - gen_run_script:
              path: '{APP_DIR}\BPJunior.exe'
