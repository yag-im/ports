installer:
  tasks:
    - copy_src_cd_images:
    - qemu:
        flavor: WINXPSP3
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\SETUP.EXE' # QT 4: select full install! otherwise it will crash with video decompression error
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\Oz - TMA.exe'
