installer:
  tasks:
    - file:
        path: '{DEST_DIR}/{SYSTEM_DRIVE_LETTER}/TMP'
        state: directory
    - extract:
        src: '{SRC_DIR}/{descr[distro][files][0]}'
        dest: '{DEST_DIR}/{SYSTEM_DRIVE_LETTER}/TMP'
        files:
          - BR/RSR.001
          - BR/RSR.002
          - BR/RSR.003
          - BR/RSR.004
          - BR/SETUP.EXE
    - dosbox:
        flavor: WIN311
        conf:
          fullscreen: true
        tasks:
          - run:
              path: '{SYSTEM_DRIVE}/TMP/SETUP.EXE'
              exit: false
          - gen_run_script:
              path: '{APP_DIR}/br.exe'
    - file:
        path: '{DEST_DIR}/{SYSTEM_DRIVE_LETTER}/TMP'
        state: absent
