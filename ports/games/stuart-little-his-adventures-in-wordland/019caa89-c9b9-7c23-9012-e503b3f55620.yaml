  tags:
installer:
  tasks:
    - extract:
        src: "{SRC_DIR}"
        dest: "{DEST_DIR}"
        cd_images_as_letters: true
    - wine:
        os_ver: win95 # otherwise DX of the required version can't be installed
        tasks:
          - mount:
              letter: "{FIRST_CD_DRIVE_LETTER}"
              src: "{DEST_DIR}/{FIRST_CD_DRIVE_LETTER}"
          - run: # TODO: install from setup.exe -> menu doesn't work, somehow explorer.exe is required?
              path: "EXPLORER.EXE" # also installs DX
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\stuadv2.exe'
