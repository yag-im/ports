descr:
  distro:
    files:
      - ScoobyDooShowdown.iso
    format: 1CD
    url: https://oldgamesdownload.com/scooby-doo-showdown-in-ghost-town/
  igdb_slug: scooby-doo-showdown-in-ghost-town
  lang: en
  media_assets:
  name: "Scooby-Doo: Showdown in Ghost Town"
  platform: win
  publisher: The Learning Company
  refs:
    ag_id:
    lutris_id: scooby-doo-showdown-in-ghost-town
    mg_id: 52007
    pcgw_id:
    qz_id:
  reqs:
    color_bits: 16
    screen_height: 480
    screen_width: 640
    ua:
      lock_pointer: true # requires custom mode for wine
  runner:
    name: wine
    ver: "11.0"
  uuid: 019cbbd6-c57d-748c-aeca-8d1d7e48cc17
  year_released: 2000
  tags:
installer:
  tasks:
    - extract:
        src: "{SRC_DIR}"
        dest: "{DEST_DIR}"
        cd_images_as_letters: true
    - wine:
        # black screen in qemu/winxp; mouse is too fast/jumps in qemu/win98
        tasks:
          - mount:
              letter: "{FIRST_CD_DRIVE_LETTER}"
              src: "{DEST_DIR}/{FIRST_CD_DRIVE_LETTER}"
          - run:
              path: '{FIRST_CD_DRIVE}\SETUP.EXE' # also installs DX 8
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\scooby.exe'
