installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        flavor: WIN95OSR25 # script error on Esc in WIN311
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\INSTAL32.EXE' # QT2.1.2
              exit: false
          - gen_run_script:
              path: '{APP_DRIVE}\ALC_101\start95.exe' # setup ignores destination folder
