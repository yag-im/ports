    - copy_src_cd_images:
    - qemu:
        flavor: WINXPSP3
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\Installera Pettson3.exe'
              exit: false
          - copy:
              src: '{FIRST_CD_DRIVE}\Crack\Pettson3.exe' # nocd fix
              dest: "{APP_DIR}"
          - gen_run_script:
              path: '{APP_DIR}\Pettson3.exe'
