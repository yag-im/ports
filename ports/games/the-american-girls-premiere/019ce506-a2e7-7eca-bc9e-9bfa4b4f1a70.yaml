installer:
  # app installs from CD1, runds from CD2
  tasks:
    - copy_src_cd_images:
    - dosbox:
        app_drive_size: 20 # min 15MB is required
        flavor: WIN95OSR25
        tasks:
          - mount:
              letter: "{FIRST_CD_DRIVE_LETTER}"
              src:
                - "{DEST_DIR}/{FIRST_CD_DRIVE_LETTER}"
          - run:
              path: '{FIRST_CD_DRIVE}\SETUP.EXE' # QT2.1.1
              exit: false
          - umount:
              letter: "{FIRST_CD_DRIVE_LETTER}"
          - mount:
              letter: "{FIRST_CD_DRIVE_LETTER}"
              src:
                - "{DEST_DIR}/{SECOND_CD_DRIVE_LETTER}"
          - gen_run_script:
              path: '{APP_DIR}\AMGirls.exe'
