              src: '{DEST_DIR}'
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\PLAY.EXE' # QT5, DX
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\Reader Rabbit 2nd Grade\2nd Grade Mis-cheese-ious Adventures.exe'
