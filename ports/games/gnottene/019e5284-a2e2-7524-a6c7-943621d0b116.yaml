descr:
  distro:
    files:
      - tft-gnottarna.iso
    format: 1CD
    url: https://archive.org/download/tft-gnottarna/tft-gnottarna.iso
  igdb_slug: gnottene
  lang: sv # norsk and dansk are also on CD
  media_assets:
    cover:
      image_id: 019e5284-a2e2-7524-a6c7-943621d0b116
    screenshots: []
  name: Gnottarna
  platform: win
  publisher: Pan Vision
  refs:
    ag_id:
    lutris_id:
    mg_id:
    pcgw_id:
    qz_id:
  reqs:
    color_bits: 16 # 16-bit is mentioned in handbook pdf
    screen_height: 600
    screen_width: 800
  runner:
    name: qemu
    ver: latest
  uuid: 019e5284-a2e2-7524-a6c7-943621d0b116
  year_released: 2003
  tags:
    - kids
installer:
  tasks:
    - copy_src_cd_images:
    - qemu:
        flavor: WINXPSP3
        tasks:
          - mount:
              src: '{DEST_DIR}'
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\start.exe'
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\Gnottarna\Gnottarna.exe'
