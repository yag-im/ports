installer:
  tasks:
    - copy_src_cd_images:
    - qemu:
        flavor: WINXPSP3
        tasks:
          - mount:
              src: '{DEST_DIR}'
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\SETUP.EXE'
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\TLCRUN.EXE'
              args:
                - Main
              exit: false
