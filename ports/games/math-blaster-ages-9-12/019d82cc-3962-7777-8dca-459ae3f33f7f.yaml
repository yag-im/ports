installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        app_drive_size: 40 # uses 7, but setup fails with 10MB drive
        flavor: WIN95OSR25
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\SETUP.EXE' # DX5
              exit: false
          - gen_run_script:
              path: '{FIRST_CD_DRIVE}\MB9_12\MB9_12.EXE'
              args:
                - '{FIRST_CD_DRIVE}\mb9_12\mb9_12.bap'
