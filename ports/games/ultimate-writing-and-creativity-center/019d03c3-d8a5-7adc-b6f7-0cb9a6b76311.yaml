descr:
  distro:
    files:
      - UWCC_CD.ISO
    format: 1CD
    url: https://archive.org/download/uwcc-cd/UWCC_CD.ISO
  igdb_slug: ultimate-writing-and-creativity-center
  lang: en
  media_assets:
    cover:
      image_id: 019d03c3-d8a5-7adc-b6f7-0cb9a6b76311
    screenshots: []
  name: Ultimate Writing & Creativity Center
  platform: win
  publisher: SoftKey Multimedia
  refs:
    ag_id:
    lutris_id:
    mg_id:
    pcgw_id:
    qz_id:
  reqs:
    # install requirements screen
    color_bits: 8
    screen_height: 480
    screen_width: 640
  runner:
    name: dosbox-x
    ver: 2025.12.01
  uuid: 019d03c3-d8a5-7adc-b6f7-0cb9a6b76311
  year_released: 1997
  tags:
installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        app_drive_size: 40 # uses 30MB of temp store
        flavor: WIN95OSR25 # sign-in screen name printing issue in WIN311 (existing names are not being printed)
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\SETUP.EXE'
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\UWCC32.EXE'
