descr:
  distro:
    files:
      - OREGON.ISO
    format: 1CD
    url: https://d2.xp.myabandonware.com/t/a02eb405-00c9-4b43-852f-cfed29b55172/Oregon-Trail-Deluxe_DOS_EN_ISO-Version.zip
    # v3.0.1, with SoundBlaster and VGA support
  igdb_slug: the-oregon-trail-deluxe
  lang: en
  media_assets:
  name: The Oregon Trail Deluxe
  platform: dos # this release also contains windows version
  publisher: MECC
  refs:
    ag_id:
    lutris_id: the-oregon-trail-deluxe
    mg_id: 746
    pcgw_id:
    qz_id:
  reqs:
    color_bits: 8
    screen_height: 480
    screen_width: 640
  runner:
    name: dosbox
    ver: 0.74-3
  uuid: 019d071f-a7ba-7f9f-9c84-50a9fe46f8c3
  year_released: 1997
  tags:
    - kids
installer:
  tasks:
    - copy_src_cd_images:
    - dosbox:
        conf:
          fullscreen: true
        tasks:
          - mount:
              src: "{DEST_DIR}"
              cd_images_as_letters: true
          - run:
              path: '{FIRST_CD_DRIVE}\INSTALL.EXE'
          - gen_run_script:
              path: '{APP_DIR}\OREGON.EXE'
    - copy:
        src: "{PORT_FILES_DIR}/OT.CFG" # sets Adlib sound driver; reported crashes with SB driver: https://discord.com/channels/1251206620822638684/1251209459271860277/1493060447694225459
        dest: "{DEST_APP_DIR}"
