installer:
  tasks:
    - extract:
        src: "{SRC_DIR}/{descr[distro][files][0]}"
        dest: "{DEST_DIR}/{APP_DRIVE_LETTER}"
        files:
          - "Program/QuickTime" # all files in this folder are required
    - wine:
        tasks:
          - run:
              path: '{APP_DRIVE}\QuickTime\QuickTimeInstaller.exe'
          - gen_run_script:
              path: '{APP_DIR}\Media\Dieselråttor & Sjömansmöss.exe'
    - extract:
        src: "{SRC_DIR}/{descr[distro][files][0]}"
        dest: "{DEST_APP_DIR}"
        files:
          - "Filer/*"
    - copy:
        src: "{PORT_FILES_DIR}/dieselrattor.dir" # APP dir ptr
        dest: "{DEST_DIR}/.wine/drive_c/windows"
