descr:
  distro:
    files:
      - FullFartIStallet.bin
    format: 1CD
    url: https://archive.org/details/full-fart-i-stallet
  igdb_slug: pony-girl
  lang: multi
  media_assets:
    cover:
      image_id: 019ca674-bbdc-762b-a84c-e9d16893be7a
    screenshots: []
  name: Pony Girl
  platform: win
  publisher: Stabenfeldt AB
  refs:
    ag_id:
    lutris_id: pony-girl
    mg_id: 187059
    pcgw_id:
    qz_id:
  reqs:
    color_bits: 16
    screen_height: 480
    screen_width: 640
    loading_duration: 12
  runner:
    name: wine # TODO: in qemu win98 app runs locally, but not in the cloud; in qemu winxp app crashes on start
    # in wine app crashes when pressing Esc during intro videos :(
    ver: "10.0"
  uuid: 019ca674-bbdc-762b-a84c-e9d16893be7a
  year_released: 2003
  tags:
installer:
  tasks:
    - extract:
        src: "{SRC_DIR}"
        dest: "{DEST_DIR}"
        cd_images_as_letters: true
    - wine:
        os_ver: win95
        tasks:
          - mount:
              letter: "{FIRST_CD_DRIVE_LETTER}"
              src: "{DEST_DIR}/{FIRST_CD_DRIVE_LETTER}"
          - run:
              path: '{FIRST_CD_DRIVE}\Setup.exe' # proceed with Compact install; inc: QT5
              exit: false
          - gen_run_script:
              path: '{APP_DIR}\PennyHorse.exe'
              exit: false
